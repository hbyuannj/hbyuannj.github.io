            /**
             * 按题型渲染题目函数（支持过滤错题）
             * 功能说明：按题型展示全部单元相应题型的题目，支持只显示错题
             * 处理流程：
             * 1. 检查测验数据是否存在
             * 2. 收集所有单元的选择题、填空题和判断题
             * 3. 过滤错题（如果需要）
             * 4. 按照题型分组显示
             * 5. 为每个题目添加唯一的索引，以便于答案检查
             * 6. 生成HTML并设置到题目容器中
             * 7. 设置事件监听器
             */
            function renderQuestionsByTypeWithFilter(selectedType, filterWrong = false) {
                if (!quizData || !quizData.units) {
                    showError('测验数据未加载！');
                    return;
                }

                // 保存当前所有题目的收藏状态
                const favoriteStates = {};
                document.querySelectorAll('.favorite-button').forEach(button => {
                    const type = button.dataset.type;
                    const index = button.dataset.index;
                    const unitIndex = button.dataset.unitIndex;
                    const key = `${unitIndex}-${type}-${index}`;
                    favoriteStates[key] = button.classList.contains('favorited');
                });

                let html = '';
                let choiceCounter = 0;
                let fillCounter = 0;
                let judgeCounter = 0;

                // 收集所有单元的选择题
                const allChoiceQuestions = [];
                // 收集所有单元的填空题
                const allFillQuestions = [];
                // 收集所有单元的判断题
                const allJudgeQuestions = [];

                // 遍历所有单元，收集题目
                quizData.units.forEach((unit, unitIndex) => {
                    // 收集选择题
                    if (unit.选择题 && unit.选择题.length > 0 && (selectedType === 'all' || selectedType === 'choice')) {
                        unit.选择题.forEach((q, index) => {
                            // 如果需要过滤错题，只收集首次答错的题目
                            if (!filterWrong || firstAttemptResults[`${unitIndex}-choice-${index}`] === false) {
                                allChoiceQuestions.push({
                                    question: q,
                                    unitIndex: unitIndex,
                                    originalIndex: index
                                });
                            }
                        });
                    }

                    // 收集填空题
                    if (unit.填空题 && unit.填空题.length > 0 && (selectedType === 'all' || selectedType === 'fill')) {
                        unit.填空题.forEach((q, index) => {
                            // 如果需要过滤错题，只收集首次答错的题目
                            if (!filterWrong || firstAttemptResults[`${unitIndex}-fill-${index}`] === false) {
                                allFillQuestions.push({
                                    question: q,
                                    unitIndex: unitIndex,
                                    originalIndex: index
                                });
                            }
                        });
                    }

                    // 收集判断题
                    if (unit.判断题 && unit.判断题.length > 0 && (selectedType === 'all' || selectedType === 'judge')) {
                        unit.判断题.forEach((q, index) => {
                            // 如果需要过滤错题，只收集首次答错的题目
                            if (!filterWrong || firstAttemptResults[`${unitIndex}-judge-${index}`] === false) {
                                allJudgeQuestions.push({
                                    question: q,
                                    unitIndex: unitIndex,
                                    originalIndex: index
                                });
                            }
                        });
                    }
                });

                // 渲染选择题
                if (allChoiceQuestions.length > 0 && (selectedType === 'all' || selectedType === 'choice')) {
                    html += '<div class="question-section">';
                    html += `<h2>一、选择题（共${allChoiceQuestions.length}题）</h2>`;
                    allChoiceQuestions.forEach((item, displayIndex) => {
                        const q = item.question;
                        const unitIndex = item.unitIndex;
                        const originalIndex = item.originalIndex;
                        choiceCounter++;

                        // 提取题干（移除选项部分）
                        let questionText = q.题干;
                        // 移除选项部分（匹配A. 到D. 的内容）
                        questionText = questionText.replace(/[A-D]\. .+?(?=(?:\n\s*[A-D]\.|$))/g, '').trim();
                        // 如果题干为空（只有选项），则设置为"请选择正确答案："
                        if (!questionText) {
                            questionText = "请选择正确答案：";
                        }

                        html += `<div class="question-item" data-type="choice" data-index="${displayIndex}" data-unit-index="${unitIndex}" data-original-index="${originalIndex}" data-answer="${q.答案}">`;
                        html += `<div class="title">${choiceCounter}. ${questionText.replace(/\n/g, '<br>')}</div>`;
                        html += '<div class="options">';

                        // 解析选项（A/B/C/D）
                        let options = [];
                        // 尝试匹配多行格式的选项
                        const multiLineOptions = q.题干.match(/[A-D]\. .+?(?=(?:\n\s*[A-D]\.|$))/g);
                        if (multiLineOptions) {
                            options = multiLineOptions;
                        } else {
                            // 尝试匹配单行格式的选项（如：A. to B. for C. at 或 A.toB.forC.with）
                            // 使用正则表达式匹配所有选项，包括选项之间没有空格的情况
                            const singleLineOptions = q.题干.match(/[A-D]\.\s*[^A-D]+/g);
                            if (singleLineOptions) {
                                // 清理每个选项，移除末尾可能的其他选项标记
                                options = singleLineOptions.map(opt => {
                                    // 找到下一个选项标记的位置
                                    const nextMarkerMatch = opt.match(/\s*[A-D]\.\s*/);
                                    if (nextMarkerMatch) {
                                        return opt.substring(0, nextMarkerMatch.index).trim();
                                    }
                                    return opt.trim();
                                });
                            }
                        }

                        // 渲染选项
                        options.forEach(opt => {
                            if (opt) {
                                const optKey = opt.charAt(0);
                                let optText = opt.substring(2).trim();
                                // 清理选项文本，确保只包含当前选项的内容
                                optText = optText.replace(/\s*[A-D]\.\s*.*/, '').trim();
                                html += `<label><input type="radio" name="choice-${displayIndex}" value="${optKey}"> ${optKey}. ${optText}</label>`;
                            }
                        });

                        html += '</div>';
                        html += '<div class="result"></div>';
                        html += `<div class="analysis"><strong class="analysis-label">解析：</strong>${q.解析}</div>`;
                        html += '</div>';
                    });
                    html += '</div>';
                }

                // 渲染填空题
                if (allFillQuestions.length > 0 && (selectedType === 'all' || selectedType === 'fill')) {
                    html += '<div class="question-section">';
                    html += `<h2>二、填空题（共${allFillQuestions.length}题）</h2>`;
                    allFillQuestions.forEach((item, displayIndex) => {
                        const q = item.question;
                        const unitIndex = item.unitIndex;
                        const originalIndex = item.originalIndex;
                        fillCounter++;

                        // 处理填空题，确保data-answer属性正确设置
                        const answer = q.答案 || '';
                        const inputHtml = `<input type="text" class="fill-input" data-answer="${answer}">`;
                        // 替换4-15个下划线为输入框
                        let processedQuestionText = q.题干.replace(/_{4,15}/g, inputHtml);

                        html += `<div class="question-item" data-type="fill" data-index="${displayIndex}" data-unit-index="${unitIndex}" data-original-index="${originalIndex}" data-answer="${answer}">`;
                        html += `<div class="title">${fillCounter}. ${processedQuestionText}</div>`;
                        html += '<div class="result"></div>';
                        html += `<div class="analysis"><strong class="analysis-label">解析：</strong>${q.解析}</div>`;
                        html += '</div>';
                    });
                    html += '</div>';
                }

                // 渲染判断题
                if (allJudgeQuestions.length > 0 && (selectedType === 'all' || selectedType === 'judge')) {
                    html += '<div class="question-section">';
                    html += `<h2>三、判断题（共${allJudgeQuestions.length}题）</h2>`;
                    allJudgeQuestions.forEach((item, displayIndex) => {
                        const q = item.question;
                        const unitIndex = item.unitIndex;
                        const originalIndex = item.originalIndex;
                        judgeCounter++;

                        html += `<div class="question-item" data-type="judge" data-index="${displayIndex}" data-unit-index="${unitIndex}" data-original-index="${originalIndex}" data-answer="${q.答案}">`;
                        html += `<div class="title">${judgeCounter}. ${q.题干}</div>`;
                        html += '<div class="options">';
                        html += `<label><input type="radio" name="judge-${displayIndex}" value="对"> 对</label>`;
                        html += `<label><input type="radio" name="judge-${displayIndex}" value="错"> 错</label>`;
                        html += '</div>';
                        html += '<div class="result"></div>';
                        html += `<div class="analysis"><strong class="analysis-label">解析：</strong>${q.解析}</div>`;
                        html += '</div>';
                    });
                    html += '</div>';
                }

                // 如果没有题目
                if (choiceCounter === 0 && fillCounter === 0 && judgeCounter === 0) {
                    html += '<div style="text-align: center; padding: 50px; font-size: 18px; color: #28a745;">';
                    html += '🎉 恭喜！你没有错题！';
                    html += '</div>';
                }

                // 设置题目容器内容
                questionContainerEl.innerHTML = html;

                // 设置事件监听器
                setupQuestionEventListeners();

                // 恢复之前的收藏状态
                document.querySelectorAll('.favorite-button').forEach(button => {
                    const type = button.dataset.type;
                    const index = button.dataset.index;
                    const unitIndex = button.dataset.unitIndex;
                    const key = `${unitIndex}-${type}-${index}`;
                    
                    if (favoriteStates[key]) {
                        button.classList.add('favorited');
                        button.textContent = '★'; // 实心五角星
                        // 更新答题情况导航栏中对应题目的图标
                        updateFavoriteStatus(type, index, unitIndex, index, true);
                    }
                });

                // 滚动到页面顶部
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function enableBottomRightButtonsExceptWrongAnswers() {

            // 计算本次答题积分
            function calculateSessionScore(correctCount, totalCount) {
                if (isAutoAnswered) {
                    return 0;
                }
                // 计算得分
                const score = Math.round((correctCount / totalCount) * 100);
                // 获取“不计总分”复选框状态
                const noTotalScoreEl = document.getElementById('no-total-score');
                const isNoTotalScore = noTotalScoreEl ? noTotalScoreEl.checked : false;
                // 只有得分大于等于85分才能获得积分，除非勾选了“不计总分”
                if (score < 85 && !isNoTotalScore) {
                    return 0;
                }
                // 每答对1道题得到1个积分
                return correctCount;
            }
            
            /**
             * 计算当前本轮获得的积分
             * 功能说明：根据当前答对的题目数量计算本轮获得的积分
             * @param {number} correctCount - 答对的题目数量
             * @returns {number} - 获得的积分
             */
            function calculateCurrentSessionScore(correctCount) {
                if (isAutoAnswered) {
                    return 0;
                }
                // 每答对1道题得到1个积分
                return correctCount;
            }

             */
            function updateSingleQuestionStatus(questionInfo) {

                // 找到对应题目的状态元素
                const statusElements = document.querySelectorAll('.question-item-status');
                let targetElement = null;
                
                statusElements.forEach(element => {

                    }
                });
                
                if (!targetElement) {
                    return;
                }
                
                // 计算题目状态
                const questionKey = `${unitIndex}-${type}-${index}`;
                const isAnswered = questionKey in firstAttemptResults;
                let statusClass = 'question-unanswered';
                
                if (isAnswered) {
                    // 获取尝试次数
                    const attemptCount = attemptCounts[questionKey] || 0;
                    // 获取当前答题状态
                    const isCorrect = firstAttemptResults[questionKey];
                    
                    if (!isCorrect) {
                        // 最近一次仍没有答对，显示红色图标
                        statusClass = 'question-wrong';
                    } else if (attemptCount > 1) {
                        // 第2次以上才答对，显示黄色图标
                        statusClass = 'question-corrected';
                    } else {
                        // 第1次就答对，显示绿色图标
                        statusClass = 'question-answered';

                                        } else {

                    isAutoAnswered = false;
                    return;
                }
                
                // 计算本次答题积分并显示弹窗
                let correctCount = 0;
                let totalCount = 0;

                // 检查是否是按题型答题模式
                if (byTypeEl.checked) {
                    // 按题型答题模式：计算所有显示题目的数量
                    totalCount = document.querySelectorAll('.question-item').length;
                } else {
                    // 按单元答题模式：计算当前单元的题目数量
                    const unitIndex = parseInt(unitSelectorEl.value);
                    if (quizData && quizData.units && quizData.units[unitIndex]) {
                        const unit = quizData.units[unitIndex];
                        if (unit.选择题) totalCount += unit.选择题.length;
                        if (unit.填空题) totalCount += unit.填空题.length;
                        if (unit.判断题) totalCount += unit.判断题.length;
                    }
                }

                // 计算正确题数
                Object.keys(firstAttemptResults).forEach(key => {
                    if (firstAttemptResults[key]) {
                        correctCount++;
                    }
                });

                // 计算得分
                const score = totalCount > 0 ? Math.round((correctCount / totalCount) * 100) : 0;
                
                // 显示积分确认弹窗
                showScoreConfirmPopup(correctCount, totalCount, score);
            };
            
            // 存储班级学生数据
            let classData = {};
            // 倒计时定时器
            let countdownInterval = null;
            // 存储每个班级的点名清单
            let rollCallList = {};
            // 当前班级
            let currentClass = null;
            
            // 初始化点名功能
            function initRollCall() {
                // 获取点名弹窗元素
                rollCallModal = document.getElementById('roll-call-modal');
                console.log('点名弹窗元素:', rollCallModal);
                
                // 创建文件选择输入元素
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = '.json';
                fileInput.style.display = 'none';
                document.body.appendChild(fileInput);
                
                // 文件选择事件处理
                fileInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        console.log('选择了文件:', file.name);
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            try {
                                const data = JSON.parse(e.target.result);
                                console.log('成功读取JSON文件:', data);
                                if ('classes' in data) {
                                    classData = data.classes;
                                    console.log('classData赋值后:', classData);
                                    // 显示成功信息
                                    document.getElementById('name-display').textContent = '文件加载成功';
                                    // 打开点名弹窗
                                    toggleRollCallModal();
                                } else {
                                    console.error('JSON文件格式错误，缺少classes属性');
                                    document.getElementById('name-display').textContent = '文件格式错误，缺少classes属性';
                                }
                            } catch (error) {
                                console.error('解析JSON失败:', error);
                                document.getElementById('name-display').textContent = '解析JSON失败';
                            }
                        };
                        reader.onerror = function() {
                            console.error('读取文件失败');
                            document.getElementById('name-display').textContent = '读取文件失败';
                        };
                        reader.readAsText(file);
                    }
                });
                
                // 添加Ctrl+Q组合键事件监听器（用于选择文件或打开/关闭点名弹窗）
                document.addEventListener('keydown', function(e) {
                    if (e.ctrlKey && e.key === 'q') {
                        e.preventDefault();
                        console.log('按下Ctrl+Q');
                        // 检查classData是否已经加载
                        if (Object.keys(classData).length === 0) {
                            // 首次按下，打开文件选择对话框
                            console.log('首次按下Ctrl+Q，打开文件选择对话框');
                            fileInput.click();
                        } else {
                            // 已经加载了数据，直接切换点名弹窗
                            console.log('已经加载了班级数据，切换点名弹窗');
                            toggleRollCallModal();
                        }
                    }
                });
                

                
                // 为班级按钮添加点击事件
                const classButtons = document.querySelectorAll('#roll-call-modal button[data-class]');
                console.log('班级按钮数量:', classButtons.length);
                classButtons.forEach(button => {
                    console.log('班级按钮:', button);
                    button.addEventListener('click', function() {
                        const classNum = this.dataset.class;
                        console.log('点击班级按钮:', classNum);
                        handleClassButtonClick(classNum, this);
                    });
                });
            }
            
            // 切换点名弹窗显示/隐藏
            function toggleRollCallModal() {
                if (rollCallModal.style.display === 'block') {
                    // 关闭弹窗
                    stopRollCall();
                    rollCallModal.style.display = 'none';
                } else {
                    // 打开弹窗
                    rollCallModal.style.display = 'block';
                    document.getElementById('name-display').textContent = '请选择班级';
                }
            }
            
            // 处理班级按钮点击
            function handleClassButtonClick(classNum, button) {
                if (rollCallInterval) {
                    // 如果已经在点名，停止点名
                    stopRollCall();
                    button.textContent = classNum + '班';
                } else {
                    // 开始点名
                    startRollCall(classNum, button);
                }
            }
            
            // 开始点名
            function startRollCall(classNum, button) {
                // 停止之前的点名（如果有）
                stopRollCall();
                
                // 更新当前班级
                currentClass = classNum;
                
                // 显示加载状态
                document.getElementById('name-display').textContent = '正在加载...';
                
                // 读取文件内容
                console.log('开始点名函数被调用');
                console.log('班级编号:', classNum);
                console.log('按钮元素:', button);
                console.log('班级数据:', classData);
                
                // 检查classData是否已经加载
                if (Object.keys(classData).length === 0) {
                    console.error('班级数据未加载，尝试重新加载');
                    // 重新加载班级数据
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', 'CourseNL.JSON?' + new Date().getTime(), true);
                    
                    xhr.onreadystatechange = function() {
                        if (xhr.readyState === 4) {
                            if (xhr.status === 200) {
                                try {
                                    const data = JSON.parse(xhr.responseText);
                                    console.log('成功读取CourseNL.JSON:', data);
                                    classData = data.classes;
                                    
                                    // 获取对应班级的学生列表
                                    currentNames = classData[classNum] || [];
                                    console.log('解析后的姓名列表:', currentNames);
                                    
                                    if (currentNames.length === 0) {
                                        document.getElementById('name-display').textContent = '该班级无学生记录';
                                        return;
                                    }
                                    
                                    // 更新按钮文本为"停止"
                                    button.textContent = '停止';
                                    
                                    // 开始随机选择名字
                        rollCallInterval = setInterval(() => {
                            const randomIndex = Math.floor(Math.random() * currentNames.length);
                            document.getElementById('name-display').textContent = currentNames[randomIndex];
                        }, 100);
                        
                        // 设置自动停止定时器（3-5秒）
                        const autoStopTime = Math.floor(Math.random() * 2000) + 3000; // 3000-5000毫秒
                        const startTime = Date.now();
                        const countdownElement = document.getElementById('countdown');
                        
                        // 显示倒计时
                        countdownElement.style.display = 'block';
                        
                        // 启动倒计时更新
                        countdownInterval = setInterval(() => {
                            const elapsedTime = Date.now() - startTime;
                            const remainingTime = autoStopTime - elapsedTime;
                            if (remainingTime > 0) {
                                // 计算剩余时间（精确到0.01秒）
                                const seconds = (remainingTime / 1000).toFixed(2);
                                countdownElement.textContent = seconds + 's';
                            } else {
                                clearInterval(countdownInterval);
                                countdownElement.style.display = 'none';
                            }
                        }, 10); // 每10毫秒更新一次
                        
                        // 自动停止点名
                        setTimeout(() => {
                            stopRollCall();
                            clearInterval(countdownInterval);
                            countdownElement.style.display = 'none';
                            button.textContent = classNum + '班';
                        }, autoStopTime);
                                } catch (error) {
                                    console.error('解析JSON失败:', error);
                                    document.getElementById('name-display').textContent = `读取文件失败: 解析JSON失败`;
                                }
                            } else {
                                console.error('文件读取失败，状态码:', xhr.status);
                                document.getElementById('name-display').textContent = `读取文件失败，状态码: ${xhr.status}`;
                            }
                        }
                    };
                    
                    xhr.onerror = function() {
                        console.error('网络错误:', xhr);
                        document.getElementById('name-display').textContent = '读取文件失败: 网络错误';
                    };
                    
                    xhr.send();
                } else {
                    // 获取对应班级的学生列表
                    currentNames = classData[classNum] || [];
                    console.log('解析后的姓名列表:', currentNames);
                    
                    if (currentNames.length === 0) {
                        document.getElementById('name-display').textContent = '该班级无学生记录';
                        return;
                    }
                    
                    // 更新按钮文本为"停止"
                    button.textContent = '停止';
                    
                    // 开始随机选择名字
                    rollCallInterval = setInterval(() => {
                        const randomIndex = Math.floor(Math.random() * currentNames.length);
                        document.getElementById('name-display').textContent = currentNames[randomIndex];
                    }, 100);
                    
                    // 设置自动停止定时器（3-5秒）
                    const autoStopTime = Math.floor(Math.random() * 2000) + 3000; // 3000-5000毫秒
                    const startTime = Date.now();
                    const countdownElement = document.getElementById('countdown');
                    
                    // 显示倒计时
                    countdownElement.style.display = 'block';
                    
                    // 启动倒计时更新
                    countdownInterval = setInterval(() => {
                        const elapsedTime = Date.now() - startTime;
                        const remainingTime = autoStopTime - elapsedTime;
                        if (remainingTime > 0) {
                            // 计算剩余时间（精确到0.01秒）
                            const seconds = (remainingTime / 1000).toFixed(2);
                            countdownElement.textContent = seconds + 's';
                        } else {
                            clearInterval(countdownInterval);
                            countdownElement.style.display = 'none';
                        }
                    }, 10); // 每10毫秒更新一次
                    
                    // 自动停止点名
                    setTimeout(() => {
                        stopRollCall();
                        clearInterval(countdownInterval);
                        countdownElement.style.display = 'none';
                        button.textContent = classNum + '班';
                    }, autoStopTime);
                }
            }
            
            // 停止点名
            function stopRollCall() {
                if (rollCallInterval) {
                    clearInterval(rollCallInterval);
                    rollCallInterval = null;
                }
                
                // 清除倒计时定时器
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                
                // 隐藏倒计时
                const countdownElement = document.getElementById('countdown');
                if (countdownElement) {
                    countdownElement.style.display = 'none';
                }
                
                // 获取当前显示的学生姓名
                const nameDisplay = document.getElementById('name-display');
                const selectedName = nameDisplay.textContent;
                
                // 将被选中的学生添加到对应班级的清单中
                if (currentClass && selectedName && selectedName !== '请选择班级' && selectedName !== '正在加载...' && !selectedName.includes('读取文件失败') && !selectedName.includes('该班级无学生记录')) {
                    if (!rollCallList[currentClass]) {
                        rollCallList[currentClass] = [];
                    }
                    // 避免重复添加
                    if (!rollCallList[currentClass].includes(selectedName)) {
                        rollCallList[currentClass].push(selectedName);
                    }
                    
                    // 更新对应班级按钮的title属性
                    const classButton = document.querySelector(`#roll-call-modal button[data-class="${currentClass}"]`);
                    if (classButton) {
                        classButton.title = '已点名学生：' + rollCallList[currentClass].join('，');
                    }
                }
                
                // 恢复所有按钮的文本
                document.querySelectorAll('#roll-call-modal button[data-class]').forEach(button => {
                    button.textContent = button.dataset.class + '班';
                });
            }
        });

        /**
         * 自定义提示框功能
         * 功能说明：显示自定义的提示框
         * 处理流程：
         * 1. 获取提示框相关元素
         * 2. 处理消息中的换行符
         * 3. 显示提示框
         * 4. 重新绑定关闭按钮事件
         * 与界面元素关联：与customAlert、alertContent、alertClose元素相关
         * 使用方法：内部函数，在需要显示提示信息时调用
         */

    </script>
</body>
</html>

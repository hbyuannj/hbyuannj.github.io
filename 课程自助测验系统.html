            }

            /**
             * 计算单元统计信息
             * 功能说明：计算单个单元的题目统计信息，包括各题型数量和收藏题目数量
             * 处理流程：
             * 1. 计算选择题数量（如果存在）
             * 2. 计算填空题数量（如果存在）
             * 3. 计算判断题数量（如果存在）
             * 4. 计算单元总题数
             * 5. 计算各题型中标记为"收藏"的题目数量
             * 6. 计算收藏题目总数
             * 7. 返回包含所有统计信息的对象
             * 与程序界面元素的关联：
             * - 关联元素：#import-stats（导入统计区域）
             * 操作使用方法：
             * - 由displayImportStats和calculateTotalStats函数调用
             * - 系统会在导入统计信息中显示这些数据
             */
            function calculateUnitStats(unit) {
                const multipleChoiceCount = unit.选择题 ? unit.选择题.length : 0;
                const fillInCount = unit.填空题 ? unit.填空题.length : 0;
                const trueFalseCount = unit.判断题 ? unit.判断题.length : 0;
                const unitTotal = multipleChoiceCount + fillInCount + trueFalseCount;

                // 计算收藏题目数量
                const favoriteMultipleChoice = unit.选择题 ? unit.选择题.filter(q => q.收藏 === '是').length : 0;
                const favoriteFillIn = unit.填空题 ? unit.填空题.filter(q => q.收藏 === '是').length : 0;
                const favoriteTrueFalse = unit.判断题 ? unit.判断题.filter(q => q.收藏 === '是').length : 0;
                const favoriteTotal = favoriteMultipleChoice + favoriteFillIn + favoriteTrueFalse;

                return {
                    multipleChoiceCount,
                    fillInCount,
                    trueFalseCount,
                    unitTotal,
                    favoriteMultipleChoice,
                    favoriteFillIn,
                    favoriteTrueFalse,
                    favoriteTotal
                };
            }

            /**
             * 计算总体统计信息
             * 功能说明：计算所有单元的总体统计信息，包括总单元数、总题数、各题型总数和总收藏题目数
             * 处理流程：
             * 1. 初始化各种统计变量为0
             * 2. 遍历所有单元
             * 3. 对每个单元调用calculateUnitStats函数获取统计信息
             * 4. 累加各题型数量和收藏题目数量
             * 5. 返回包含所有总体统计信息的对象
             * 与程序界面元素的关联：
             * - 关联元素：#import-stats（导入统计区域）
             * 操作使用方法：
             * - 由displayImportStats函数调用
             * - 系统会在导入统计信息的概览部分显示这些数据
             */
            function calculateTotalStats(units) {
                let totalQuestions = 0;
                let totalMultipleChoice = 0;
                let totalFillIn = 0;
                let totalTrueFalse = 0;
                let totalFavorites = 0;

                units.forEach(unit => {
                    const stats = calculateUnitStats(unit);
                    totalMultipleChoice += stats.multipleChoiceCount;
                    totalFillIn += stats.fillInCount;
                    totalTrueFalse += stats.trueFalseCount;
                    totalQuestions += stats.unitTotal;
                    totalFavorites += stats.favoriteTotal;
                });

                return {
                    totalUnits: units.length,
                    totalQuestions,
                    totalMultipleChoice,
                    totalFillIn,
                    totalTrueFalse,
                    totalFavorites
                };
            }

            /**
             * 显示导入统计信息
             * 功能说明：在导入统计区域显示详细的测验数据统计信息，包括总体概览和各单元详细统计
             * 处理流程：
             * 1. 检查测验数据是否存在
             * 2. 更新当前文件名显示
             * 3. 调用calculateTotalStats函数计算总体统计信息
             * 4. 构建包含导入数据概览和各单元详细统计的HTML
             * 5. 为每个单元调用calculateUnitStats函数获取详细统计信息
             * 6. 将统计信息填充到HTML表格中
             * 7. 更新统计内容容器的innerHTML
             * 8. 显示导入统计区域
             * 与程序界面元素的关联：
             * - 关联元素：#import-stats（导入统计区域）、#file-info（文件信息区域）、#stats-content（统计内容区域）
             * 操作使用方法：
             * - 当导入JSON文件或文本后自动调用
             * - 系统会在导入统计区域显示美观的统计信息表格
             */
            function displayImportStats() {
                if (!quizData || !quizData.units) return;

                // 计算总题数和各题型数量
                const totalStats = calculateTotalStats(quizData.units);
                
                // 更新文件名显示，添加统计信息
                fileInfoEl.innerHTML = `<strong>当前JSON文件：</strong>${currentFileName} <span style="margin-left: 20px; font-weight: normal;">总题数：${totalStats.totalQuestions} | 选择题：${totalStats.totalMultipleChoice} | 填空题：${totalStats.totalFillIn} | 判断题：${totalStats.totalTrueFalse}</span>`;

                // 构建统计信息HTML
                let statsHTML = `
                    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                        <!-- 各单元详细统计 -->
                        <div style="flex: 1; min-width: 300px;">
                            <div style="margin-bottom: 6px; font-weight: bold; color: #495057; font-size: 14px;">各单元详细统计：</div>
                            <div class="stats-table-container">
                                <!-- 表头部分 -->
                                <table class="stats-table stats-table-header">
                                    <thead>
                                        <tr style="background-color: #007bff; color: white; font-weight: 500;">
                                            <th style="padding: 5px 8px; text-align: left; border: none;">单元名称</th>
                                            <th style="padding: 5px 8px; text-align: center; border: none; width: 80px;">总题数</th>
                                            <th style="padding: 5px 8px; text-align: center; border: none; width: 70px;">选择</th>
                                            <th style="padding: 5px 8px; text-align: center; border: none; width: 70px;">填空</th>
                                            <th style="padding: 5px 8px; text-align: center; border: none; width: 70px;">判断</th>
                                            <th style="padding: 5px 8px; text-align: center; border: none; width: 70px;">收藏</th>
                                        </tr>
                                    </thead>
                                </table>
                                <!-- 表体部分（可滚动） -->
                                <div class="stats-body-container">
                                    <table class="stats-table stats-table-body">
                                        <tbody>
                `;

                // 初始化汇总数据
                let totalUnitTotal = 0;
                let totalMultipleChoiceCount = 0;
                let totalFillInCount = 0;
                let totalTrueFalseCount = 0;
                let totalFavoriteTotal = 0;

                // 添加表格内容
                quizData.units.forEach((unit, unitIndex) => {
                    const stats = calculateUnitStats(unit);

                    // 累加汇总数据
                    totalUnitTotal += stats.unitTotal;
                    totalMultipleChoiceCount += stats.multipleChoiceCount;
                    totalFillInCount += stats.fillInCount;
                    totalTrueFalseCount += stats.trueFalseCount;
                    totalFavoriteTotal += stats.favoriteTotal;

                    statsHTML += `
                        <tr style="${unitIndex % 2 === 0 ? 'background-color: #ffffff;' : 'background-color: #f8f9fa;'}">
                            <td style="padding: 6px 8px; border-bottom: 1px solid #e9ecef; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; color: #495057;">${unit.unitName}</td>
                            <td style="padding: 6px 8px; text-align: center; border-bottom: 1px solid #e9ecef; color: #495057; width: 80px;">${stats.unitTotal}</td>
                            <td style="padding: 6px 8px; text-align: center; border-bottom: 1px solid #e9ecef; color: #495057; width: 70px;">${stats.multipleChoiceCount}</td>
                            <td style="padding: 6px 8px; text-align: center; border-bottom: 1px solid #e9ecef; color: #495057; width: 70px;">${stats.fillInCount}</td>
                            <td style="padding: 6px 8px; text-align: center; border-bottom: 1px solid #e9ecef; color: #495057; width: 70px;">${stats.trueFalseCount}</td>
                            <td style="padding: 6px 8px; text-align: center; border-bottom: 1px solid #e9ecef; color: #495057; width: 70px;">${stats.favoriteTotal}</td>
                        </tr>
                    `;
                });

                // 添加汇总行
                statsHTML += `
                        <tr style="background-color: #e3f2fd; font-weight: bold;">
                            <td style="padding: 6px 8px; border-bottom: 1px solid #e9ecef; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; color: #1976d2;">总计</td>
                            <td style="padding: 6px 8px; text-align: center; border-bottom: 1px solid #e9ecef; color: #1976d2; width: 80px;">${totalUnitTotal}</td>
                            <td style="padding: 6px 8px; text-align: center; border-bottom: 1px solid #e9ecef; color: #1976d2; width: 70px;">${totalMultipleChoiceCount}</td>
                            <td style="padding: 6px 8px; text-align: center; border-bottom: 1px solid #e9ecef; color: #1976d2; width: 70px;">${totalFillInCount}</td>
                            <td style="padding: 6px 8px; text-align: center; border-bottom: 1px solid #e9ecef; color: #1976d2; width: 70px;">${totalTrueFalseCount}</td>
                            <td style="padding: 6px 8px; text-align: center; border-bottom: 1px solid #e9ecef; color: #1976d2; width: 70px;">${totalFavoriteTotal}</td>
                        </tr>
                `;

                statsHTML += `
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                // 显示统计信息
                statsContentEl.innerHTML = statsHTML;
                importStatsEl.style.display = 'block';
                
                // 调整表头宽度以匹配表体
                adjustStatsTableHeader();
            }
            
            // 调整统计表格表头宽度以匹配表体（考虑滚动条）
            function adjustStatsTableHeader() {
                const headerTable = document.querySelector('.stats-table-header');
                const bodyContainer = document.querySelector('.stats-body-container');
                const bodyTable = bodyContainer ? bodyContainer.querySelector('.stats-table-body') : null;
                
                if (headerTable && bodyTable) {
                    // 调整表头整体宽度以匹配表体容器
                    const bodyWidth = bodyContainer.clientWidth;
                    headerTable.style.width = bodyWidth + 'px';
                    
                    // 调整每一列的宽度以匹配表体
                    const headerCols = headerTable.querySelectorAll('th');
                    const bodyCols = bodyTable.querySelectorAll('tr:first-child td');
                    
                    if (headerCols.length === bodyCols.length) {
                        for (let i = 0; i < headerCols.length; i++) {
                            const bodyColWidth = bodyCols[i].offsetWidth;
                            headerCols[i].style.width = bodyColWidth + 'px';
                        }
                    }
                }
            }
            
            // 页面加载后调整
            window.addEventListener('load', adjustStatsTableHeader);
            // 窗口大小改变时调整
            window.addEventListener('resize', adjustStatsTableHeader);

            /**
             * 显示功能区域
             * 功能说明：在导入测验数据成功后，显示相关功能区域并隐藏不需要的区域
             * 处理流程：
             * 1. 隐藏加载和错误提示
             * 2. 隐藏导入区域（用户可通过点击按钮重新显示）
             * 3. 更新"显示/隐藏导入信息"按钮的文本和标题
             * 4. 显示单元选择区域
             * 5. 显示提交答案按钮容器
             * 与程序界面元素的关联：
             * - 关联元素：#loading（加载提示）、#error（错误提示）、#import-section（导入区域）、#toggle-import-info（切换导入信息按钮）、#unit-select（单元选择区域）、#btn-container（按钮容器）
             * 操作使用方法：
             * - 当导入JSON文件或文本成功后自动调用
             * - 系统会切换到测验模式，显示相关功能区域
             */
            function showFunctionalAreas() {
                // 隐藏加载和错误提示
                loadingEl.style.display = 'none';
                errorEl.style.display = 'none';

                // 隐藏导入区域（用户可通过右下角按钮显示）
                const importSectionEl = document.getElementById('import-section');
                importSectionEl.style.display = 'none';

                // 显示功能区域
                unitSelectEl.style.display = 'block';
                btnContainerEl.style.display = 'block';
                
                // 显示左侧答题情况导航区
                const questionStatusPanel = document.getElementById('question-status-panel');
                if (questionStatusPanel) {
                    questionStatusPanel.style.display = 'block';
                }
                
                // 启用"答题情况"复选框
                const showStatusEl = document.getElementById('show-answer-status');
                if (showStatusEl) {
                    showStatusEl.checked = true;
                }
                
                // 根据"按题型答题"复选框的状态处理下拉列表框的显示状态
                if (byTypeEl.checked) {
                    unitSelectorEl.style.display = 'none';
                    typeSelectorEl.style.display = 'inline-block';
                } else {
                    unitSelectorEl.style.display = 'inline-block';
                    typeSelectorEl.style.display = 'none';
                }
                
                // 自动启用除"仅显示错题"以外的右下角的所有其它按钮
                enableBottomRightButtonsExceptWrongAnswers();
            }

            /**
             * 显示错误信息
             * 功能说明：显示错误提示信息，并隐藏加载提示
             * 处理流程：
             * 1. 调用showCustomAlert函数显示错误信息
             * 2. 隐藏加载提示
             * 与程序界面元素的关联：
             * - 关联元素：#loading（加载提示）
             * 操作使用方法：
             * - 当发生错误时调用
             * - 系统会显示错误提示并隐藏加载状态
             */
            function showError(message) {
                showCustomDialog('提示', message, 'error');
                loadingEl.style.display = 'none';
            }

            /**
             * 显示成功信息
             * 功能说明：显示成功提示信息，并隐藏错误提示和加载提示
             * 处理流程：
             * 1. 调用showCustomDialog函数显示成功信息
             * 2. 隐藏错误提示
             * 3. 隐藏加载提示
             * 与程序界面元素的关联：
             * - 关联元素：#error（错误提示）、#loading（加载提示）
             * 操作使用方法：
             * - 当操作成功时调用
             * - 系统会显示成功提示并隐藏错误和加载状态
             */
            function showSuccess(message) {
                showCustomDialog('提示', message, 'success');
                errorEl.style.display = 'none';
                loadingEl.style.display = 'none';
                // 启用"开始答题"按钮
                const startQuizBtn = document.getElementById('start-quiz-btn');
                if (startQuizBtn) {
                    startQuizBtn.disabled = false;
                }
            }

            /**
             * 显示自定义弹窗
             * 功能说明：显示自定义弹窗，目前内部调用showCustomAlert函数
             * 处理流程：
             * 1. 调用showCustomAlert函数显示消息
             * 与程序界面元素的关联：
             * - 关联元素：系统弹窗
             * 操作使用方法：
             * - 当需要显示自定义弹窗时调用
             * - 系统会显示包含指定消息的弹窗
             */
            /**
             * 通用对话框函数
             * 功能说明：创建并显示自定义对话框，支持不同类型的对话框和按钮配置
             * 参数：
             * - options: 对话框配置对象
             *   - title: 对话框标题
             *   - content: 对话框内容（HTML字符串）
             *   - buttons: 按钮配置数组
             *     - id: 按钮ID
             *     - text: 按钮文本
             *     - style: 按钮样式（CSS字符串）
             *     - callback: 按钮点击回调函数
             *   - width: 对话框宽度（可选）
             *   - maxWidth: 对话框最大宽度（可选）
             *   - padding: 对话框内边距（可选）
             * 返回值：无
             */
            function showCustomDialog(options) {
                // 检查是否是三个参数的形式（title, message, type）
                if (arguments.length === 3) {
                    const title = arguments[0];
                    const message = arguments[1];
                    const type = arguments[2];
                    
                    // 根据类型设置不同的颜色
                    let bgColor = '#28a745'; // 默认绿色
                    
                    switch (type) {
                        case 'info':
                            bgColor = '#28a745'; // 绿色
                            break;
                        case 'success':
                            bgColor = '#28a745'; // 绿色
                            break;
                        case 'warning':
                            bgColor = '#ffc107'; // 黄色
                            break;
                        case 'error':
                            bgColor = '#dc3545'; // 红色
                            break;
                    }

                    // 使用自定义对话框显示简单提示
                    showCustomDialog({
                        title: title,
                        content: `
                            <div style="margin-bottom: 20px; line-height: 1.6; text-align: center; color: ${bgColor};">
                                ${message.replace(/\n/g, '<br>')}
                            </div>
                        `,
                        buttons: [
                            {
                                id: 'alert-close',
                                text: '确定',
                                style: `
                                    background-color: ${bgColor};
                                    color: white;
                                    border: none;
                                    padding: 10px 30px;
                                    border-radius: 5px;
                                    cursor: pointer;
                                    font-size: 14px;
                                    transition: background-color 0.3s;
                                `,
                                callback: function() {
                                    // 无特殊操作，仅关闭对话框
                                }
                            }
                        ],
                        maxWidth: '400px'
                    });
                    
                    return;
                }
                
                // 默认配置
                const defaultOptions = {
                    title: '',
                    content: '',
                    buttons: [],
                    width: '90%',
                    maxWidth: '500px',
                    padding: '0'
                };
                
                // 合并配置
                const config = Object.assign({}, defaultOptions, options);
                
                // 创建遮罩层
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background-color: rgba(0, 0, 0, 0.5);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 10000;
                    animation: fadeIn 0.3s ease-in-out;
                `;
                
                // 创建对话框
                const dialog = document.createElement('div');
                dialog.style.cssText = `
                    background-color: white;
                    border-radius: 10px;
                    box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
                    width: ${config.width};
                    max-width: ${config.maxWidth};
                    overflow: hidden;
                    animation: slideIn 0.3s ease-in-out;
                `;
                
                // 构建对话框内容
                let dialogHTML = '';
                
                // 添加标题栏
                if (config.title) {
                    dialogHTML += `
                        <div style="background-color: #28a745; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
                            <div><span style="font-weight: bold; font-size: 16px;">${config.title}</span></div>
                            <button class="close-btn" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 0 5px;">&times;</button>
                        </div>
                    `;
                }
                
                // 添加内容
                dialogHTML += `<div style="padding: 20px;">${config.content}</div>`;
                
                // 添加按钮
                if (config.buttons && config.buttons.length > 0) {
                    dialogHTML += `<div style="padding: 15px; text-align: center;">`;
                    config.buttons.forEach(button => {
                        // 如果没有指定样式，使用默认的绿色按钮样式
                        if (!button.style) {
                            button.style = `
                                background-color: #28a745;
                                color: white;
                                border: none;
                                padding: 10px 30px;
                                border-radius: 5px;
                                cursor: pointer;
                                font-size: 14px;
                                transition: background-color 0.3s;
                                margin: 0 10px;
                            `;
                        }
                        dialogHTML += `<button id="${button.id}" style="${button.style}">${button.text}</button>`;
                    });
                    dialogHTML += `</div>`;
                }
                
                // 设置对话框内容
                dialog.innerHTML = dialogHTML;
                
                // 添加对话框到遮罩层
                overlay.appendChild(dialog);
                // 添加遮罩层到页面
                document.body.appendChild(overlay);
                
                // 为关闭按钮添加点击事件
                const closeBtn = dialog.querySelector('.close-btn');
                if (closeBtn) {
                    closeBtn.addEventListener('click', function() {
                        // 移除遮罩层
                        document.body.removeChild(overlay);
                    });
                }
                
                // 为按钮添加点击事件
                config.buttons.forEach(button => {
                    const buttonEl = dialog.querySelector(`#${button.id}`);
                    if (buttonEl && button.callback) {
                        buttonEl.addEventListener('click', function() {
                            // 移除遮罩层
                            document.body.removeChild(overlay);
                            // 调用回调函数
                            button.callback();
                        });
                    }
                });
            }

            /**
             * 通用答案检查函数
             * 功能说明：检查不同类型题目的答案是否正确，并显示结果和解析
             * 处理流程：
             * 1. 获取结果和解析元素
             * 2. 显示结果和解析区域
             * 3. 根据题目类型执行不同的检查逻辑：
             *    - 选择题：检查选中的选项是否与正确答案一致
             *    - 填空题：检查输入的答案是否与正确答案一致（忽略大小写）
             *    - 判断题：检查选中的选项是否与正确答案一致
             * 4. 根据检查结果设置不同的提示信息和样式
             * 5. 返回答案是否正确的布尔值
             * 与程序界面元素的关联：
             * - 关联元素：.result（结果显示区域）、.analysis（解析显示区域）、各种题型的输入元素
             * 操作使用方法：
             * - 由checkSingleQuestion和checkAnswers函数调用
             * - 系统会自动检查答案并显示结果和解析
             */
            function checkQuestionAnswer(type, unit, questionIndex, questionItem) {
                const resultEl = questionItem.querySelector('.result');
                const analysisEl = questionItem.querySelector('.analysis');

                // 显示结果和解析区域
                resultEl.style.display = 'block';
                analysisEl.style.display = 'block';

                let isCorrect = false;
                let question;

                // 获取题目在页面上的显示索引
                const displayIndex = questionItem.dataset.index;

                switch (type) {
                    case 'choice':
                        question = unit.选择题[questionIndex];
                        // 使用displayIndex查找单选按钮，因为在按题型答题模式下，name属性使用的是displayIndex
                        const selectedOption = questionItem.querySelector(`input[name="choice-${displayIndex}"]:checked`);

                        if (selectedOption) {
                            if (selectedOption.value === question.答案) {
                                resultEl.textContent = `✅ 回答正确！正确答案：${question.答案}`;
                                resultEl.className = 'result correct';
                                isCorrect = true;
                            } else {
                                resultEl.textContent = `❌ 回答错误！正确答案：${question.答案}`;
                                resultEl.className = 'result wrong';
                            }
                        } else {
                            resultEl.textContent = `⚠️ 未作答！正确答案：${question.答案}`;
                            resultEl.className = 'result wrong';
                        }
                        break;

                    case 'fill':
                        question = unit.填空题[questionIndex];
                        const inputEls = questionItem.querySelectorAll('.fill-input');
                        
                        let allCorrect = true;
                        
                        if (inputEls.length === 1) {
                            // 只有一个空时，直接比较完整答案
                            const userAnswer = inputEls[0].value.trim().toLowerCase();
                            const correctAnswer = question.答案.trim().toLowerCase();
                            if (userAnswer !== correctAnswer) {
                                allCorrect = false;
                            }
                        } else {
                            // 多个空时，处理答案分隔符：优先使用分号，没有分号则使用空格
                            let correctAnswers = [];
                            if (question.答案.includes(';') || question.答案.includes('；')) {
                                // 使用分号或中文分号分割
                                correctAnswers = question.答案.split(/[;；]/).map(answer => answer.trim().toLowerCase());
                            } else {
                                // 使用空格分割
                                correctAnswers = question.答案.split(/\s+/).map(answer => answer.trim().toLowerCase());
                            }
                            
                            for (let i = 0; i < inputEls.length; i++) {
                                const userAnswer = inputEls[i].value.trim().toLowerCase();
                                if (i >= correctAnswers.length || userAnswer !== correctAnswers[i]) {
                                    allCorrect = false;
                                    break;
                                }
                            }
                        }

                        if (allCorrect) {
                            resultEl.textContent = `✅ 回答正确！正确答案：${question.答案}`;
                            resultEl.className = 'result correct';
                            isCorrect = true;
                        } else {
                            resultEl.textContent = `❌ 回答错误！正确答案：${question.答案}`;
                            resultEl.className = 'result wrong';
                        }
                        break;

                    case 'judge':
                        question = unit.判断题[questionIndex];
                        // 使用displayIndex查找单选按钮，因为在按题型答题模式下，name属性使用的是displayIndex
                        const judgeOption = questionItem.querySelector(`input[name="judge-${displayIndex}"]:checked`);

                        if (judgeOption) {
                            if (judgeOption.value === question.答案) {
                                resultEl.textContent = `✅ 回答正确！正确答案：${question.答案}`;
                                resultEl.className = 'result correct';
                                isCorrect = true;
                            } else {
                                resultEl.textContent = `❌ 回答错误！正确答案：${question.答案}`;
                                resultEl.className = 'result wrong';
                            }
                        } else {
                            resultEl.textContent = `⚠️ 未作答！正确答案：${question.答案}`;
                            resultEl.className = 'result wrong';
                        }
                        break;
                }

                return isCorrect;
            }

            /**
             * 检查单个题目答案
             * 功能说明：检查单个题目的答案是否正确，并记录首次答题结果
             * 处理流程：
             * 1. 检查测验数据是否存在
             * 2. 获取当前单元和题目元素
             * 3. 调用通用答案检查函数checkQuestionAnswer检查答案
             * 4. 记录首次答题结果到firstAttemptResults对象
             * 5. 如果答题正确，调用scrollToNextQuestion函数自动滚动到下一题
             * 与程序界面元素的关联：
             * - 关联元素：.question-item（题目元素）
             * 操作使用方法：
             * - 当用户完成单个题目并需要检查答案时调用
             * - 系统会检查答案并记录结果，如果正确则自动滚动到下一题
             */
            function checkSingleQuestion(type, unitIndex, questionIndex) {
                if (!quizData || !quizData.units) {
                    return;
                }

                let unit;
                let actualUnitIndex = unitIndex;
                let actualQuestionIndex = questionIndex;
                
                // 查找题目元素
                const questionItem = document.querySelector(`.question-item[data-type="${type}"][data-index="${questionIndex}"]`);
                
                if (questionItem) {
                    // 检查是否是按题型答题模式
                    const byTypeUnitIndex = questionItem.dataset.unitIndex;
                    const byTypeQuestionIndex = questionItem.dataset.originalIndex;
                    
                    if (byTypeUnitIndex && byTypeQuestionIndex) {
                        // 使用原始单元索引和题目索引
                        actualUnitIndex = parseInt(byTypeUnitIndex);
                        actualQuestionIndex = parseInt(byTypeQuestionIndex);
                    }
                }

                // 检查单元是否存在
                if (!quizData.units[actualUnitIndex]) {
                    return;
                }

                unit = quizData.units[actualUnitIndex];

                // 使用通用答案检查函数
                const isCorrect = checkQuestionAnswer(type, unit, actualQuestionIndex, questionItem);

                // 记录首次答题结果
                const questionKey = `${actualUnitIndex}-${type}-${actualQuestionIndex}`;
                
                // 初始化尝试次数
                if (!(questionKey in attemptCounts)) {
                    attemptCounts[questionKey] = 0;
                }
                
                // 增加尝试次数
                attemptCounts[questionKey]++;
                
                if (!(questionKey in firstAttemptResults)) {
                    firstAttemptResults[questionKey] = isCorrect;
                } else if (!firstAttemptResults[questionKey] && isCorrect && usedRetryAttempts < MAX_RETRY_ATTEMPTS) {
                // 首次答题错误，现在答对了，且还有重试次数
                // 询问用户是否使用重试机会
                const remainingAttempts = MAX_RETRY_ATTEMPTS - usedRetryAttempts;
                showRetryConfirmDialog('重试机会使用', `你首次答题错误，现在答对了！\n剩余重试机会：${remainingAttempts}次\n是否使用一次重试机会来计分？`, function(confirmUse) {
                    if (confirmUse) {
                        // 用户确认使用重试机会
                        usedRetryAttempts++;
                        firstAttemptResults[questionKey] = true;
                        questionCorrectionHistory[questionKey] = true; // 标记为首次答错后来答对
                        
                        const newRemainingAttempts = MAX_RETRY_ATTEMPTS - usedRetryAttempts;
                        showCustomDialog('重试机会使用成功', `恭喜！你使用了一次重试机会答对了这道题。\n剩余重试机会：${newRemainingAttempts}次`, 'success');
                        
                        // 触发题目回答事件，更新左侧浮动窗口
                        document.dispatchEvent(new Event('questionAnswered'));
                    }
                });
                }

                // 如果答题正确，自动滚动到下一题
                if (isCorrect) {
                    scrollToNextQuestion(type, questionIndex);
                }
                
                // 触发题目回答事件，更新左侧浮动窗口
                document.dispatchEvent(new Event('questionAnswered'));
            }

            /**
             * 滚动到下一题
             * 功能说明：自动滚动到下一个题目，提供流畅的答题体验
             * 处理流程：
             * 1. 检查自动滚动选项是否开启
             * 2. 获取当前题目元素
             * 3. 查找当前题目之后的下一个元素
             * 4. 如果下一个元素不是题目元素，继续向后查找
             * 5. 如果找到下一个题目元素，延迟500毫秒后平滑滚动到该元素
             * 与程序界面元素的关联：
             * - 关联元素：.question-item（题目元素）
             * 操作使用方法：
             * - 当用户答对题目后自动调用
             * - 系统会平滑滚动到下一个题目，让用户可以继续答题
             */
            function scrollToNextQuestion(currentType, currentIndex) {
                // 检查自动滚动选项是否开启
                if (!autoScrollEl.checked) return;
                
                // 获取当前题目元素
                const currentQuestion = document.querySelector(`.question-item[data-type="${currentType}"][data-index="${currentIndex}"]`);
                if (!currentQuestion) return;

                // 查找当前题目所在的题型区域
                const currentSection = currentQuestion.closest('.question-section');
                if (!currentSection) return;

                // 检查当前题目是否是本题型的最后一道题
                const currentTypeQuestions = currentSection.querySelectorAll(`.question-item[data-type="${currentType}"]`);
                const isLastInType = currentQuestion === currentTypeQuestions[currentTypeQuestions.length - 1];

                if (isLastInType) {
                    // 如果是本题型的最后一道题，寻找下一题型的第一个题目
                    let nextSection = currentSection.nextElementSibling;
                    while (nextSection) {
                        if (nextSection.classList.contains('question-section')) {
                            // 找到下一题型区域，滚动到该区域的第一个题目
                            const firstQuestionInNextSection = nextSection.querySelector('.question-item');
                            if (firstQuestionInNextSection) {
                                setTimeout(() => {
                                    firstQuestionInNextSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                                }, 500); // 延迟滚动，让用户有时间看到正确反馈
                            }
                            break;
                        }
                        nextSection = nextSection.nextElementSibling;
                    }
                } else {
                    // 如果不是本题型的最后一道题，滚动到下一个题目
                    let nextQuestion = currentQuestion.nextElementSibling;
                    while (nextQuestion) {
                        if (nextQuestion.classList.contains('question-item')) {
                            setTimeout(() => {
                                nextQuestion.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }, 500); // 延迟滚动，让用户有时间看到正确反馈
                            break;
                        }
                        nextQuestion = nextQuestion.nextElementSibling;
                    }
                }
            }

            /**
             * 通用题目渲染函数
             * 功能说明：根据单元数据渲染题目HTML，支持按题型分类显示和错题过滤
             * 处理流程：
             * 1. 初始化HTML字符串和题目计数器
             * 2. 渲染选择题：
             *    - 过滤错题（如果需要）
             *    - 提取题干和选项
             *    - 处理不同格式的选项
             *    - 生成选择题HTML
             * 3. 渲染填空题：
             *    - 过滤错题（如果需要）
             *    - 替换______为输入框
             *    - 生成填空题HTML
             * 4. 渲染判断题：
             *    - 过滤错题（如果需要）
             *    - 生成判断题HTML，包含对/错选项
             * 5. 如果过滤错题后没有题目，显示恭喜信息
             * 6. 返回生成的HTML字符串
             * 与程序界面元素的关联：
             * - 关联元素：.question-section（题目区域）、.question-item（题目项）、.options（选项区域）、.result（结果区域）、.analysis（解析区域）
             * 操作使用方法：
             * - 由renderQuestions函数调用
             * - 系统会根据单元数据生成美观的题目HTML布局
             */
            function renderQuestionsHTML(unit, unitIndex, filterWrong = false, filterFavorites = false) {
                let html = '';
                let questionCounter = 0;

                // 渲染选择题
                if (unit.选择题 && unit.选择题.length > 0) {
                    let questions = unit.选择题;
                    let filteredQuestions = [];

                    // 如果需要过滤错题
                    if (filterWrong) {
                        filteredQuestions = questions.filter((q, index) => {
                            const questionKey = `${unitIndex}-choice-${index}`;
                            return firstAttemptResults[questionKey] === false;
                        });
                    } else if (filterFavorites) {
                        // 如果需要过滤收藏题目
                        filteredQuestions = questions.filter((q, index) => {
                            // 检查题目是否被收藏
                            const favoriteButton = document.querySelector(`.favorite-button[data-type="choice"][data-index="${index}"][data-unit-index="${unitIndex}"]`);
                            return favoriteButton && favoriteButton.classList.contains('favorited');
                        });
                    } else {
                        filteredQuestions = questions;
                    }

                    if (filteredQuestions.length > 0) {
                        html += '<div class="question-section">';
                        html += `<h2>一、选择题（共${filteredQuestions.length}题）</h2>`;
                        filteredQuestions.forEach((q, displayIndex) => {
                            // 找到原始索引
                            const originalIndex = questions.indexOf(q);
                            questionCounter++;
                            html += `<div class="question-item" data-type="choice" data-index="${originalIndex}" data-answer="${q.答案}">`;
                            html += `<div class="favorite-button" data-type="choice" data-index="${originalIndex}" data-unit-index="${unitIndex}" data-original-index="${originalIndex}">☆</div>`;
                            // 提取题干（移除选项部分）
                            let questionText = q.题干;
                            // 移除选项部分（匹配A. 到D. 的内容）
                            questionText = questionText.replace(/[A-D]\. .+?(?=(?:\n\s*[A-D]\.|$))/g, '').trim();
                            // 如果题干为空（只有选项），则设置为"请选择正确答案："
                            if (!questionText) {
                                questionText = "请选择正确答案：";
                            }
                            html += `<div class="title">${filterWrong ? questionCounter : originalIndex + 1}. ${questionText.replace(/\n/g, '<br>')}</div>`;
                            html += '<div class="options">';
                            // 解析选项（A/B/C/D）
                            let options = [];
                            // 尝试匹配多行格式的选项
                            const multiLineOptions = q.题干.match(/[A-D]\. .+?(?=(?:\n\s*[A-D]\.|$))/g);
                            if (multiLineOptions) {
                                options = multiLineOptions;
                            } else {
                                // 尝试匹配单行格式的选项（如：A. to B. for C. at 或 A.toB.forC.with）
                                // 使用正则表达式匹配所有选项，包括选项之间没有空格的情况
                                const singleLineOptions = q.题干.match(/[A-D]\.\s*[^A-D]+/g);
                                if (singleLineOptions) {
                                    // 清理每个选项，移除末尾可能的其他选项标记
                                    options = singleLineOptions.map(opt => {
                                        // 找到下一个选项标记的位置
                                        const nextMarkerMatch = opt.match(/\s*[A-D]\.\s*/);
                                        if (nextMarkerMatch) {
                                            return opt.substring(0, nextMarkerMatch.index).trim();
                                        }
                                        return opt.trim();
                                    });
                                }
                            }

                            // 如果仍然没有找到选项，尝试更简单的方法
                            if (options.length === 0) {
                                // 查找所有选项标记的位置
                                const markerPositions = [];
                                for (let i = 0; i < q.题干.length; i++) {
                                    const char = q.题干.charAt(i);
                                    if (/[A-D]/.test(char) && q.题干.charAt(i + 1) === '.') {
                                        markerPositions.push(i);
                                    }
                                }

                                // 基于标记位置分割选项
                                if (markerPositions.length > 0) {
                                    for (let i = 0; i < markerPositions.length; i++) {
                                        const start = markerPositions[i];
                                        const end = (i < markerPositions.length - 1) ? markerPositions[i + 1] : q.题干.length;
                                        options.push(q.题干.substring(start, end).trim());
                                    }
                                }
                            }

                            // 渲染选项
                            options.forEach(opt => {
                                if (opt) {
                                    const optKey = opt.charAt(0);
                                    let optText = opt.substring(2).trim();
                                    // 清理选项文本，确保只包含当前选项的内容
                                    optText = optText.replace(/\s*[A-D]\.\s*.*/, '').trim();
                                    html += `<label><input type="radio" name="choice-${originalIndex}" value="${optKey}"> ${optKey}. ${optText}</label>`;
                                }
                            });
                            html += '</div>';
                            html += '<div class="result"></div>';
                            html += `<div class="analysis"><strong class="analysis-label">解析：</strong>${q.解析}</div>`;
                            html += '</div>';
                        });
                        html += '</div>';
                    }
                }

                // 渲染填空题
                if (unit.填空题 && unit.填空题.length > 0) {
                    let questions = unit.填空题;
                    let filteredQuestions = [];

                    // 如果需要过滤错题
                    if (filterWrong) {
                        filteredQuestions = questions.filter((q, index) => {
                            const questionKey = `${unitIndex}-fill-${index}`;
                            return firstAttemptResults[questionKey] === false;
                        });
                    } else if (filterFavorites) {
                        // 如果需要过滤收藏题目
                        filteredQuestions = questions.filter((q, index) => {
                            // 检查题目是否被收藏
                            const favoriteButton = document.querySelector(`.favorite-button[data-type="fill"][data-index="${index}"][data-unit-index="${unitIndex}"]`);
                            return favoriteButton && favoriteButton.classList.contains('favorited');
                        });
                    } else {
                        filteredQuestions = questions;
                    }

                    if (filteredQuestions.length > 0) {
                        html += '<div class="question-section">';
                        html += `<h2>二、填空题（共${filteredQuestions.length}题）</h2>`;
                        filteredQuestions.forEach((q, displayIndex) => {
                            // 找到原始索引
                            const originalIndex = questions.indexOf(q);
                            questionCounter++;
                            // 处理填空题，确保data-answer属性正确设置
                            const answer = q.答案 || '';
                            const inputHtml = `<input type="text" class="fill-input" data-answer="${answer}">`;
                            // 替换4-15个下划线为输入框
                            let processedQuestionText = q.题干.replace(/_{4,15}/g, inputHtml);
                            html += `<div class="question-item" data-type="fill" data-index="${originalIndex}" data-answer="${answer}">`;
                            html += `<div class="favorite-button" data-type="fill" data-index="${originalIndex}" data-unit-index="${unitIndex}" data-original-index="${originalIndex}">☆</div>`;
                            html += `<div class="title">${filterWrong ? questionCounter : originalIndex + 1}. ${processedQuestionText}</div>`;
                            html += '<div class="result"></div>';
                            html += `<div class="analysis"><strong class="analysis-label">解析：</strong>${q.解析}</div>`;
                            html += '</div>';
                        });
                        html += '</div>';
                    }
                }

                // 渲染判断题
                if (unit.判断题 && unit.判断题.length > 0) {
                    let questions = unit.判断题;
                    let filteredQuestions = [];

                    // 如果需要过滤错题
                    if (filterWrong) {
                        filteredQuestions = questions.filter((q, index) => {
                            const questionKey = `${unitIndex}-judge-${index}`;
                            return firstAttemptResults[questionKey] === false;
                        });
                    } else if (filterFavorites) {
                        // 如果需要过滤收藏题目
                        filteredQuestions = questions.filter((q, index) => {
                            // 检查题目是否被收藏
                            const favoriteButton = document.querySelector(`.favorite-button[data-type="judge"][data-index="${index}"][data-unit-index="${unitIndex}"]`);
                            return favoriteButton && favoriteButton.classList.contains('favorited');
                        });
                    } else {
                        filteredQuestions = questions;
                    }

                    if (filteredQuestions.length > 0) {
                        html += '<div class="question-section">';
                        html += `<h2>三、判断题（共${filteredQuestions.length}题）</h2>`;
                        filteredQuestions.forEach((q, displayIndex) => {
                            // 找到原始索引
                            const originalIndex = questions.indexOf(q);
                            questionCounter++;
                            html += `<div class="question-item" data-type="judge" data-index="${originalIndex}" data-answer="${q.答案}">`;
                            html += `<div class="favorite-button" data-type="judge" data-index="${originalIndex}" data-unit-index="${unitIndex}" data-original-index="${originalIndex}">☆</div>`;
                            html += `<div class="title">${filterWrong ? questionCounter : originalIndex + 1}. ${q.题干}</div>`;
                            html += '<div class="options">';
                            html += `<label><input type="radio" name="judge-${originalIndex}" value="对"> 对</label>`;
                            html += `<label><input type="radio" name="judge-${originalIndex}" value="错"> 错</label>`;
                            html += '</div>';
                            html += '<div class="result"></div>';
                            html += `<div class="analysis"><strong class="analysis-label">解析：</strong>${q.解析}</div>`;
                            html += '</div>';
                        });
                        html += '</div>';
                    }
                }

                // 如果没有题目
                if (questionCounter === 0 && filterWrong) {
                    html += '<div style="text-align: center; padding: 50px; font-size: 18px; color: #28a745;">';
                    html += '🎉 恭喜！你没有错题！';
                    html += '</div>';
                }

                return html;
            }

            /**
             * 设置题目事件监听器
             * 功能说明：为题目相关元素设置事件监听器，包括填空题的双击事件和逐题检查答案的监听器
             * 处理流程：
             * 1. 为所有填空题输入框添加双击事件监听器：
             *    - 双击时自动填写正确答案
             *    - 如果启用了逐题检查答案，自动检查该题
             * 2. 如果启用了逐题检查答案，调用setupAutoCheckListeners函数设置自动检查监听器
             * 与程序界面元素的关联：
             * - 关联元素：.question-item[data-type="fill"] input[type="text"]（填空题输入框）
             * 操作使用方法：
             * - 由renderQuestions函数调用
             * - 系统会为题目元素设置必要的事件监听器
             */
            /**
             * 为填空题输入框添加双击事件监听器
             * 功能说明：双击填空题输入框时自动填写正确答案并调整输入框宽度
             */
            function setupFillInputDoubleClickListeners() {
                document.querySelectorAll('.question-item[data-type="fill"] input[type="text"]').forEach(input => {
                    input.addEventListener('dblclick', function () {
                        const questionItem = this.closest('.question-item');
                        const questionIndex = questionItem.dataset.index;
                        const unitIndex = parseInt(unitSelectorEl.value);
                        const questionKey = `${unitIndex}-fill-${questionIndex}`;
                        
                        // 找到当前题目中的所有输入框
                        const inputs = questionItem.querySelectorAll('input[type="text"]');
                        
                        if (inputs.length === 1) {
                            // 只有一个空时，直接填入完整答案
                            const answer = this.dataset.answer;
                            inputs[0].value = answer;
                            // 自动调整输入框宽度以容纳内容
                            inputs[0].style.width = `${Math.max(108, answer.length * 24)}px`;
                        } else {
                            // 多个空时，处理答案分隔符：优先使用分号，没有分号则使用空格
                            let answers = [];
                            if (this.dataset.answer.includes(';') || this.dataset.answer.includes('；')) {
                                // 使用分号或中文分号分割
                                answers = this.dataset.answer.split(/[;；]/).map(answer => answer.trim());
                            } else {
                                // 使用空格分割
                                answers = this.dataset.answer.split(/\s+/).map(answer => answer.trim());
                            }
                            
                            // 按顺序填充答案并调整宽度
                            inputs.forEach((input, index) => {
                                if (answers[index]) {
                                    input.value = answers[index];
                                    // 自动调整输入框宽度以容纳内容
                                    input.style.width = `${Math.max(98, answers[index].length * 12)}px`;
                                }
                            });
                        }
                        
                        // 直接标记为正确答案，以绿色显示图标
                        firstAttemptResults[questionKey] = true;
                        
                        if (autoCheckEl.checked) {
                            checkSingleQuestion('fill', unitIndex, questionIndex);
                        }
                        
                        // 触发题目回答事件，更新左侧浮动窗口
                        document.dispatchEvent(new Event('questionAnswered'));
                    });
                });
            }

            /**
             * 为收藏按钮添加点击事件监听器
             * 功能说明：点击收藏按钮时切换收藏状态并更新图标
             */
            function setupFavoriteButtonListeners() {
                document.querySelectorAll('.favorite-button').forEach(button => {
                    button.addEventListener('click', function () {
                        const type = this.dataset.type;
                        const index = this.dataset.index;
                        const unitIndex = this.dataset.unitIndex;
                        const originalIndex = this.dataset.originalIndex;
                        
                        // 切换收藏状态
                        this.classList.toggle('favorited');
                        
                        // 切换实心/空心五角星
                        if (this.classList.contains('favorited')) {
                            this.textContent = '★'; // 实心五角星
                        } else {
                            this.textContent = '☆'; // 空心五角星
                        }
                        
                        // 更新答题情况导航栏中对应题目的图标
                        updateFavoriteStatus(type, index, unitIndex, originalIndex, this.classList.contains('favorited'));
                    });
                });
            }

            /**
             * 为选择题选项添加点击事件监听器
             * 功能说明：点击选择题选项时自动检查答案
             */
            function setupChoiceOptionListeners() {
                document.querySelectorAll('.question-item[data-type="choice"] input[type="radio"]').forEach(radio => {
                    radio.addEventListener('click', function () {
                        const questionItem = this.closest('.question-item');
                        const questionIndex = questionItem.dataset.index;
                        const unitIndex = parseInt(unitSelectorEl.value);
                        checkSingleQuestion('choice', unitIndex, questionIndex);
                        
                        // 触发题目回答事件，传递当前题目信息
                        const event = new CustomEvent('questionAnswered', {
                            detail: {
                                type: 'choice',
                                index: questionIndex,
                                unitIndex: unitIndex
                            }
                        });
                        document.dispatchEvent(event);
                    });
                });
            }

            /**
             * 为填空题输入框添加回车事件监听器
             * 功能说明：按下回车键时自动检查答案
             */
            function setupFillInputKeyPressListeners() {
                document.querySelectorAll('.question-item[data-type="fill"] input[type="text"]').forEach(input => {
                    input.addEventListener('keypress', function (e) {
                        if (e.key === 'Enter') {
                            const questionItem = this.closest('.question-item');
                            const questionIndex = questionItem.dataset.index;
                            const unitIndex = parseInt(unitSelectorEl.value);
                            checkSingleQuestion('fill', unitIndex, questionIndex);
                            
                            // 触发题目回答事件，传递当前题目信息
                            const event = new CustomEvent('questionAnswered', {
                                detail: {
                                    type: 'fill',
                                    index: questionIndex,
                                    unitIndex: unitIndex
                                }
                            });
                            document.dispatchEvent(event);
                        }
                    });
                });
            }

            /**
             * 为判断题选项添加点击事件监听器
             * 功能说明：点击判断题选项时自动检查答案
             */
            function setupJudgeOptionListeners() {
                document.querySelectorAll('.question-item[data-type="judge"] input[type="radio"]').forEach(radio => {
                    radio.addEventListener('click', function () {
                        const questionItem = this.closest('.question-item');
                        const questionIndex = questionItem.dataset.index;
                        const unitIndex = parseInt(unitSelectorEl.value);
                        checkSingleQuestion('judge', unitIndex, questionIndex);
                        
                        // 触发题目回答事件，传递当前题目信息
                        const event = new CustomEvent('questionAnswered', {
                            detail: {
                                type: 'judge',
                                index: questionIndex,
                                unitIndex: unitIndex
                            }
                        });
                        document.dispatchEvent(event);
                    });
                });
            }

            /**
             * 设置逐题检查答案的事件监听器
             * 功能说明：为不同类型题目的输入元素设置自动检查答案的事件监听器
             */
            function setupAutoCheckListeners() {
                setupChoiceOptionListeners();
                setupFillInputKeyPressListeners();
                setupJudgeOptionListeners();
            }

            function setupQuestionEventListeners() {
                setupFillInputDoubleClickListeners();
                setupFavoriteButtonListeners();
                
                // 添加逐题检查答案的事件监听器
                if (autoCheckEl.checked) {
                    setupAutoCheckListeners();
                }
            }

            /**
             * 渲染题目函数
             * 功能说明：根据单元索引渲染题目，包括生成题目HTML和设置事件监听器
             * 处理流程：
             * 1. 检查测验数据是否存在以及单元是否有效
             * 2. 获取指定单元的数据
             * 3. 调用renderQuestionsHTML函数生成题目HTML（不过滤错题）
             * 4. 将生成的HTML设置到题目容器中
             * 5. 调用setupQuestionEventListeners函数设置题目事件监听器
             * 与程序界面元素的关联：
             * - 关联元素：#question-container（题目容器）
             * 操作使用方法：
             * - 当用户选择不同单元时调用
             * - 系统会根据单元数据渲染对应的题目
             */
            /**
             * 保存当前所有题目的收藏状态
             * 功能说明：将当前所有题目的收藏状态保存到对象中
             * @returns {Object} 收藏状态对象，键为题目唯一标识，值为是否被收藏
             */
            function saveFavoriteStates() {
                const favoriteStates = {};
                document.querySelectorAll('.favorite-button').forEach(button => {
                    const type = button.dataset.type;
                    const index = button.dataset.index;
                    const unitIndex = button.dataset.unitIndex;
                    const key = `${unitIndex}-${type}-${index}`;
                    favoriteStates[key] = button.classList.contains('favorited');
                });
                return favoriteStates;
            }

            /**
             * 恢复题目收藏状态
             * 功能说明：根据保存的收藏状态恢复题目的收藏状态
             * @param {Object} favoriteStates - 收藏状态对象，键为题目唯一标识，值为是否被收藏
             */
            function restoreFavoriteStates(favoriteStates) {
                document.querySelectorAll('.favorite-button').forEach(button => {
                    const type = button.dataset.type;
                    const index = button.dataset.index;
                    const unitIndex = button.dataset.unitIndex;
                    const key = `${unitIndex}-${type}-${index}`;
                    
                    if (favoriteStates[key]) {
                        button.classList.add('favorited');
                        button.textContent = '★'; // 实心五角星
                        // 更新答题情况导航栏中对应题目的图标
                        updateFavoriteStatus(type, index, unitIndex, index, true);
                    }
                });
            }

            /**
             * 题目渲染的共同逻辑
             * 功能说明：处理题目渲染的公共步骤，包括保存和恢复收藏状态、设置事件监听器等
             * @param {string} html - 生成的题目HTML
             */
            function renderQuestionsCommon(html) {
                // 保存当前所有题目的收藏状态
                const favoriteStates = saveFavoriteStates();

                questionContainerEl.innerHTML = html;

                // 设置事件监听器
                setupQuestionEventListeners();
                
                // 恢复之前的收藏状态
                restoreFavoriteStates(favoriteStates);
                
                // 触发题目渲染完成事件
                setTimeout(() => {
                    document.dispatchEvent(new Event('questionsRendered'));
                }, 100);
            }

            function renderQuestions(unitIndex, filterFavorites = false) {
                if (!quizData || !quizData.units || !quizData.units[unitIndex]) {
                    showError('测验数据未加载或单元不存在！');
                    return;
                }

                const unit = quizData.units[unitIndex];
                const html = renderQuestionsHTML(unit, unitIndex, false, filterFavorites);

                renderQuestionsCommon(html);
            }

            /**
             * 按题型渲染题目函数
             * 功能说明：按题型展示全部单元相应题型的题目
             * 处理流程：
             * 1. 检查测验数据是否存在
             * 2. 收集所有单元的选择题、填空题和判断题
             * 3. 按照题型分组显示
             * 4. 为每个题目添加唯一的索引，以便于答案检查
             * 5. 生成HTML并设置到题目容器中
             * 6. 设置事件监听器
             */
            function renderQuestionsByType(selectedType, filterFavorites = false) {
                if (!quizData || !quizData.units) {
                    showError('测验数据未加载！');
                    return;
                }

                // 保存当前所有题目的收藏状态
                const favoriteStates = {};
                document.querySelectorAll('.favorite-button').forEach(button => {
                    const type = button.dataset.type;
                    const index = button.dataset.index;
                    const unitIndex = button.dataset.unitIndex;
                    const key = `${unitIndex}-${type}-${index}`;
                    favoriteStates[key] = button.classList.contains('favorited');
                });

                let html = '';
                let choiceCounter = 0;
                let fillCounter = 0;
                let judgeCounter = 0;

                // 收集所有单元的选择题
                const allChoiceQuestions = [];
                // 收集所有单元的填空题
                const allFillQuestions = [];
                // 收集所有单元的判断题
                const allJudgeQuestions = [];

                // 遍历所有单元，收集题目
                quizData.units.forEach((unit, unitIndex) => {
                    // 收集选择题
                    if (unit.选择题 && unit.选择题.length > 0 && (selectedType === 'all' || selectedType === 'choice')) {
                        unit.选择题.forEach((q, index) => {
                            // 如果需要过滤收藏题目
                            if (!filterFavorites || isQuestionFavorited('choice', index, unitIndex)) {
                                allChoiceQuestions.push({
                                    question: q,
                                    unitIndex: unitIndex,
                                    originalIndex: index
                                });
                            }
                        });
                    }

                    // 收集填空题
                    if (unit.填空题 && unit.填空题.length > 0 && (selectedType === 'all' || selectedType === 'fill')) {
                        unit.填空题.forEach((q, index) => {
                            // 如果需要过滤收藏题目
                            if (!filterFavorites || isQuestionFavorited('fill', index, unitIndex)) {
                                allFillQuestions.push({
                                    question: q,
                                    unitIndex: unitIndex,
                                    originalIndex: index
                                });
                            }
                        });
                    }

                    // 收集判断题
                    if (unit.判断题 && unit.判断题.length > 0 && (selectedType === 'all' || selectedType === 'judge')) {
                        unit.判断题.forEach((q, index) => {
                            // 如果需要过滤收藏题目
                            if (!filterFavorites || isQuestionFavorited('judge', index, unitIndex)) {
                                allJudgeQuestions.push({
                                    question: q,
                                    unitIndex: unitIndex,
                                    originalIndex: index
                                });
                            }
                        });
                    }
                });

                // 渲染选择题
                if (allChoiceQuestions.length > 0 && (selectedType === 'all' || selectedType === 'choice')) {
                    html += '<div class="question-section">';
                    html += `<h2>一、选择题（共${allChoiceQuestions.length}题）</h2>`;
                    allChoiceQuestions.forEach((item, displayIndex) => {
                        const q = item.question;
                        const unitIndex = item.unitIndex;
                        const originalIndex = item.originalIndex;
                        choiceCounter++;

                        // 提取题干（移除选项部分）
                        let questionText = q.题干;
                        // 移除选项部分（匹配A. 到D. 的内容）
                        questionText = questionText.replace(/[A-D]\. .+?(?=(?:\n\s*[A-D]\.|$))/g, '').trim();
                        // 如果题干为空（只有选项），则设置为"请选择正确答案："
                        if (!questionText) {
                            questionText = "请选择正确答案：";
                        }

                        html += `<div class="question-item" data-type="choice" data-index="${displayIndex}" data-unit-index="${unitIndex}" data-original-index="${originalIndex}" data-answer="${q.答案}">`;
                        html += '<div class="favorite-button" data-type="choice" data-index="${displayIndex}" data-unit-index="${unitIndex}" data-original-index="${originalIndex}">☆</div>';
                        html += `<div class="title">${choiceCounter}. ${questionText.replace(/\n/g, '<br>')}</div>`;
                        html += '<div class="options">';

                        // 解析选项（A/B/C/D）
                        let options = [];
                        // 尝试匹配多行格式的选项
                        const multiLineOptions = q.题干.match(/[A-D]\. .+?(?=(?:\n\s*[A-D]\.|$))/g);
                        if (multiLineOptions) {
                            options = multiLineOptions;
                        } else {
                            // 尝试匹配单行格式的选项（如：A. to B. for C. at 或 A.toB.forC.with）
                            // 使用正则表达式匹配所有选项，包括选项之间没有空格的情况
                            const singleLineOptions = q.题干.match(/[A-D]\.\s*[^A-D]+/g);
                            if (singleLineOptions) {
                                // 清理每个选项，移除末尾可能的其他选项标记
                                options = singleLineOptions.map(opt => {
                                    // 找到下一个选项标记的位置
                                    const nextMarkerMatch = opt.match(/\s*[A-D]\.\s*/);
                                    if (nextMarkerMatch) {
                                        return opt.substring(0, nextMarkerMatch.index).trim();
                                    }
                                    return opt.trim();
                                });
                            }
                        }

                        // 渲染选项
                        options.forEach(opt => {
                            if (opt) {
                                const optKey = opt.charAt(0);
                                let optText = opt.substring(2).trim();
                                // 清理选项文本，确保只包含当前选项的内容
                                optText = optText.replace(/\s*[A-D]\.\s*.*/, '').trim();
                                html += `<label><input type="radio" name="choice-${displayIndex}" value="${optKey}"> ${optKey}. ${optText}</label>`;
                            }
                        });

                        html += '</div>';
                        html += '<div class="result"></div>';
                        html += `<div class="analysis"><strong class="analysis-label">解析：</strong>${q.解析}</div>`;
                        html += '</div>';
                    });
                    html += '</div>';
                }

                // 渲染填空题
                if (allFillQuestions.length > 0 && (selectedType === 'all' || selectedType === 'fill')) {
                    html += '<div class="question-section">';
                    html += `<h2>二、填空题（共${allFillQuestions.length}题）</h2>`;
                    allFillQuestions.forEach((item, displayIndex) => {
                        const q = item.question;
                        const unitIndex = item.unitIndex;
                        const originalIndex = item.originalIndex;
                        fillCounter++;

                        // 处理填空题，确保data-answer属性正确设置
                        const answer = q.答案 || '';
                        const inputHtml = `<input type="text" class="fill-input" data-answer="${answer}">`;
                        // 替换4-15个下划线为输入框
                        let processedQuestionText = q.题干.replace(/_{4,15}/g, inputHtml);

                        html += `<div class="question-item" data-type="fill" data-index="${displayIndex}" data-unit-index="${unitIndex}" data-original-index="${originalIndex}" data-answer="${answer}">`;
                        html += '<div class="favorite-button" data-type="fill" data-index="${displayIndex}" data-unit-index="${unitIndex}" data-original-index="${originalIndex}">☆</div>';
                        html += `<div class="title">${fillCounter}. ${processedQuestionText}</div>`;
                        html += '<div class="result"></div>';
                        html += `<div class="analysis"><strong class="analysis-label">解析：</strong>${q.解析}</div>`;
                        html += '</div>';
                    });
                    html += '</div>';
                }

                // 渲染判断题
                if (allJudgeQuestions.length > 0 && (selectedType === 'all' || selectedType === 'judge')) {
                    html += '<div class="question-section">';
                    html += `<h2>三、判断题（共${allJudgeQuestions.length}题）</h2>`;
                    allJudgeQuestions.forEach((item, displayIndex) => {
                        const q = item.question;
                        const unitIndex = item.unitIndex;
                        const originalIndex = item.originalIndex;
                        judgeCounter++;

                        html += `<div class="question-item" data-type="judge" data-index="${displayIndex}" data-unit-index="${unitIndex}" data-original-index="${originalIndex}" data-answer="${q.答案}">`;
                        html += '<div class="favorite-button" data-type="judge" data-index="${displayIndex}" data-unit-index="${unitIndex}" data-original-index="${originalIndex}">☆</div>';
                        html += `<div class="title">${judgeCounter}. ${q.题干}</div>`;
                        html += '<div class="options">';
                        html += `<label><input type="radio" name="judge-${displayIndex}" value="对"> 对</label>`;
                        html += `<label><input type="radio" name="judge-${displayIndex}" value="错"> 错</label>`;
                        html += '</div>';
                        html += '<div class="result"></div>';
                        html += `<div class="analysis"><strong class="analysis-label">解析：</strong>${q.解析}</div>`;
                        html += '</div>';
                    });
                    html += '</div>';
                }

                // 如果没有题目
                if (choiceCounter === 0 && fillCounter === 0 && judgeCounter === 0) {
                    html += '<div style="text-align: center; padding: 50px; font-size: 18px; color: #28a745;">';
                    html += '🎉 恭喜！没有题目需要回答！';
                    html += '</div>';
                }

                // 设置题目容器内容
                renderQuestionsCommon(html);
                
                // 启用提交答案按钮
                const checkAnswersBtn = document.getElementById('check-answers');
                if (checkAnswersBtn) {
                    checkAnswersBtn.disabled = false;
                }
                
                // 触发题目渲染完成事件
                setTimeout(() => {
                    document.dispatchEvent(new Event('questionsRendered'));
                }, 100);
            }

            /**
             * 设置逐题检查答案的事件监听器
             * 功能说明：为不同类型题目的输入元素设置自动检查答案的事件监听器
             * 处理流程：
             * 1. 为所有选择题的单选按钮添加点击事件监听器：
             *    - 点击时获取题目索引和单元索引
             *    - 调用checkSingleQuestion函数检查答案
             * 2. 为所有填空题的输入框添加回车事件监听器：
             *    - 按下回车键时获取题目索引和单元索引
             *    - 调用checkSingleQuestion函数检查答案
             * 3. 为所有判断题的单选按钮添加点击事件监听器：
             *    - 点击时获取题目索引和单元索引
             *    - 调用checkSingleQuestion函数检查答案
             * 与程序界面元素的关联：
             * - 关联元素：.question-item[data-type="choice"] input[type="radio"]（选择题单选按钮）、.question-item[data-type="fill"] input[type="text"]（填空题输入框）、.question-item[data-type="judge"] input[type="radio"]（判断题单选按钮）
             * 操作使用方法：
             * - 由setupQuestionEventListeners函数调用（当启用逐题检查答案时）
             * - 系统会为题目输入元素设置自动检查答案的事件监听器
             */
            function setupAutoCheckListeners() {
                // 为选择题选项添加点击事件监听器
                document.querySelectorAll('.question-item[data-type="choice"] input[type="radio"]').forEach(radio => {
                    radio.addEventListener('click', function () {
                        const questionItem = this.closest('.question-item');
                        const questionIndex = questionItem.dataset.index;
                        const unitIndex = parseInt(unitSelectorEl.value);
                        checkSingleQuestion('choice', unitIndex, questionIndex);
                        
                        // 触发题目回答事件，传递当前题目信息
                        const event = new CustomEvent('questionAnswered', {
                            detail: {
                                type: 'choice',
                                index: questionIndex,
                                unitIndex: unitIndex
                            }
                        });
                        document.dispatchEvent(event);
                    });
                });

                // 为填空题输入框添加回车事件监听器
                document.querySelectorAll('.question-item[data-type="fill"] input[type="text"]').forEach(input => {
                    input.addEventListener('keypress', function (e) {
                        if (e.key === 'Enter') {
                            const questionItem = this.closest('.question-item');
                            const questionIndex = questionItem.dataset.index;
                            const unitIndex = parseInt(unitSelectorEl.value);
                            checkSingleQuestion('fill', unitIndex, questionIndex);
                            
                            // 触发题目回答事件，传递当前题目信息
                            const event = new CustomEvent('questionAnswered', {
                                detail: {
                                    type: 'fill',
                                    index: questionIndex,
                                    unitIndex: unitIndex
                                }
                            });
                            document.dispatchEvent(event);
                        }
                    });
                });

                // 为判断题选项添加点击事件监听器
                document.querySelectorAll('.question-item[data-type="judge"] input[type="radio"]').forEach(radio => {
                    radio.addEventListener('click', function () {
                        const questionItem = this.closest('.question-item');
                        const questionIndex = questionItem.dataset.index;
                        const unitIndex = parseInt(unitSelectorEl.value);
                        checkSingleQuestion('judge', unitIndex, questionIndex);
                        
                        // 触发题目回答事件，传递当前题目信息
                        const event = new CustomEvent('questionAnswered', {
                            detail: {
                                type: 'judge',
                                index: questionIndex,
                                unitIndex: unitIndex
                            }
                        });
                        document.dispatchEvent(event);
                    });
                });
            }

            /**
             * 核对答案函数
             * 功能说明：检查当前单元所有题目的答案，计算得分，并显示结果和提示信息
             * 处理流程：
             * 1. 获取当前选中的单元索引，并检查测验数据是否有效
             * 2. 获取单元数据，初始化正确题数和总题数计数器
             * 3. 计算总题数（包括选择题、填空题和判断题）
             * 4. 重置所有题目结果和解析的显示状态
             * 5. 检查选择题答案：
             *    - 遍历所有选择题
             *    - 调用checkQuestionAnswer函数检查答案
             *    - 统计正确题数
             *    - 记录首次答题结果
             * 6. 检查填空题答案（忽略大小写和空格）：
             *    - 遍历所有填空题
             *    - 调用checkQuestionAnswer函数检查答案
             *    - 统计正确题数
             *    - 记录首次答题结果
             * 7. 检查判断题答案：
             *    - 遍历所有判断题
